<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background-color:#f7f7f7; font-family:Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f7f7f7;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="20" cellspacing="0" style="background-color:#ffffff; margin-top:40px; border-radius:8px;">
                    <tr>
                        <td align="center" style="font-size:24px; font-weight:bold; color:#333;">
                            Your 2FA Code
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="font-size:18px; color:#555;">
                            Use the code below to complete your login:
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <div style="font-size:32px; letter-spacing:4px; font-weight:bold; color:#111; background-color:#f0f0f0; padding:15px 30px; display:inline-block; border-radius:6px;">
                                {{CODE}}
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="font-size:14px; color:#999; padding-top:30px;">
                            This code will expire in 10 minutes.<br />
                            If you did not request this, you can safely ignore this email.
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="font-size:12px; color:#ccc; padding-top:20px;">
                            &copy; 2025 MyApp Inc.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
